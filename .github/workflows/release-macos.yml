name: Release macOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish assets under, e.g. v0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            runner: macos-14
          - arch: x86_64
            runner: macos-13
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify workspace
        run: npm run check

      - name: Build macOS app and DMG
        env:
          TAURI_BUNDLES: dmg,app
        run: npm run desktop:build:macos

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-release
          app_path="$(find target/release/bundle/macos -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [[ -z "$app_path" ]]; then
            echo "No .app bundle found" >&2
            exit 1
          fi
          ditto -c -k --keepParent "$app_path" "dist-release/Mega_Vault_Viewer-macos-${{ matrix.arch }}.zip"
          dmg_path="$(find target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -type f | head -n 1 || true)"
          if [[ -n "$dmg_path" ]]; then
            cp "$dmg_path" "dist-release/Mega_Vault_Viewer-macos-${{ matrix.arch }}.dmg"
          fi
          shasum -a 256 dist-release/* > "dist-release/Mega_Vault_Viewer-macos-${{ matrix.arch }}.sha256"
          ls -lh dist-release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mega-vault-viewer-macos-${{ matrix.arch }}
          path: dist-release/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Set release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mega-vault-viewer-macos-*
          path: dist-release
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist-release

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          files: dist-release/*
