<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc" shape-rendering="geometricPrecision">
  <title id="title">Mega Vault Viewer</title>
  <desc id="desc">A conceptual public hero showing local vault files flowing into a rebuildable shadow index and a fast reader view.</desc>
  <defs>
    <linearGradient id="background" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="index" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="soft-shadow" x="-8%" y="-10%" width="116%" height="120%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#020617" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#background)"/>
  <rect x="54" y="54" width="1172" height="532" rx="24" fill="#f8fafc" filter="url(#soft-shadow)"/>

  <text x="98" y="134" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="700">Mega Vault Viewer</text>
  <text x="100" y="178" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="24">Local files stay canonical. Search, links, metadata, and reader views stay fast.</text>

  <g transform="translate(100 250)">
    <rect width="270" height="230" rx="14" fill="#e2e8f0"/>
    <text x="28" y="48" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Vault files</text>
    <rect x="30" y="78" width="172" height="34" rx="6" fill="#ffffff"/>
    <rect x="30" y="126" width="212" height="34" rx="6" fill="#ffffff"/>
    <rect x="30" y="174" width="148" height="34" rx="6" fill="#ffffff"/>
    <circle cx="232" cy="94" r="12" fill="#f97316"/>
    <circle cx="232" cy="142" r="12" fill="#22d3ee"/>
    <circle cx="232" cy="190" r="12" fill="#14b8a6"/>
  </g>

  <path d="M410 365h120" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
  <path d="M505 334l40 31-40 31" fill="none" stroke="#94a3b8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(520 235)">
    <circle cx="120" cy="130" r="116" fill="url(#index)"/>
    <circle cx="120" cy="130" r="78" fill="#ecfeff" opacity="0.92"/>
    <text x="120" y="118" text-anchor="middle" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Shadow</text>
    <text x="120" y="153" text-anchor="middle" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">index</text>
    <rect x="14" y="268" width="212" height="48" rx="24" fill="#0f172a"/>
    <text x="120" y="300" text-anchor="middle" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">rebuildable cache</text>
  </g>

  <path d="M760 365h120" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
  <path d="M855 334l40 31-40 31" fill="none" stroke="#94a3b8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(875 250)">
    <rect width="305" height="230" rx="14" fill="#111827"/>
    <text x="28" y="48" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Fast reader</text>
    <rect x="30" y="82" width="220" height="16" rx="8" fill="#22d3ee"/>
    <rect x="30" y="120" width="244" height="14" rx="7" fill="#cbd5e1"/>
    <rect x="30" y="152" width="196" height="14" rx="7" fill="#cbd5e1"/>
    <rect x="30" y="184" width="128" height="30" rx="15" fill="#facc15"/>
    <rect x="174" y="184" width="88" height="30" rx="15" fill="#22d3ee"/>
  </g>
</svg>
